<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Email Fetch{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block styles %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Email Fetch</div>
        {% if user %}
        <div class="nav-right">
            <a href="{{ url_for('index') }}" class="nav-link">Email Fetch</a>
            <a href="{{ url_for('ingest') }}" class="nav-link">Ingest</a>
            <a href="{{ url_for('emails_by_search') }}" class="nav-link">By Email</a>
            <a href="{{ url_for('search') }}" class="nav-link">Search</a>
            <a href="{{ url_for('chat') }}" class="nav-link">Chat</a>
            <a href="{{ url_for('teams') }}" class="nav-link">Teams</a>
            <a href="{{ url_for('calendar') }}" class="nav-link">Calendar</a>
            <span class="nav-user">{{ user.get("name", "User") }}</span>
            <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
        </div>
        {% endif %}
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
